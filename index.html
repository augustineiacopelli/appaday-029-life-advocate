<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --ink: #0f0e0c;
    --paper: #f5f0e8;
    --paper-dark: #ede8df;
    --accent: #c8401a;
    --accent-dim: rgba(200, 64, 26, 0.12);
    --accent-mid: rgba(200, 64, 26, 0.35);
    --gold: #b8860b;
    --muted: #7a7468;
    --rule: rgba(15,14,12,0.12);
    --card-bg: rgba(255,253,248,0.9);
    --shadow: 0 2px 16px rgba(15,14,12,0.08), 0 1px 3px rgba(15,14,12,0.06);
    --shadow-hover: 0 8px 32px rgba(15,14,12,0.14), 0 2px 8px rgba(15,14,12,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 64px 48px 48px;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    max-width: 1280px;
    margin: 0 auto;
  }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(48px, 8vw, 96px);
    line-height: 0.92;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .header-sub {
    font-size: 15px;
    color: var(--muted);
    margin-top: 20px;
    max-width: 440px;
    line-height: 1.6;
    font-weight: 300;
  }

  .header-stats {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: flex-end;
    padding-bottom: 4px;
  }

  .stat-block { text-align: right; }

  .stat-number {
    font-family: 'DM Serif Display', serif;
    font-size: 40px;
    line-height: 1;
    color: var(--ink);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .filter-zone {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(245, 240, 232, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--rule);
  }

  .filter-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 12px 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 4px;
  }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 2px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
    text-transform: uppercase;
  }

  .filter-btn:hover {
    border-color: var(--accent-mid);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 48px 96px;
    position: relative;
    z-index: 5;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    margin-top: 56px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
  }

  .section-header:first-child { margin-top: 0; }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.01em;
  }

  .section-code {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .app-card {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: var(--shadow);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .app-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }

  .app-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-hover);
    border-color: rgba(15,14,12,0.18);
  }

  .app-card:hover::after { transform: scaleX(1); }

  .card-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
  }

  .card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    font-weight: 300;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }

  .card-cat {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    background: var(--accent-dim);
    color: var(--accent);
  }

  .card-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  .card-arrow {
    position: absolute;
    top: 24px; right: 24px;
    font-size: 14px;
    color: var(--muted);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.2s, transform 0.2s;
  }

  .app-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  .empty-state {
    grid-column: 1 / -1;
    padding: 64px 0;
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
  }

  footer {
    position: relative;
    z-index: 5;
    border-top: 1px solid var(--rule);
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-motto {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
  }

  .footer-link {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  .footer-link:hover { color: var(--accent); }

  /* category color overrides */
  [data-cat="G"] .card-cat { background: rgba(39,110,183,0.1); color: #276EB7; }
  [data-cat="U"] .card-cat { background: rgba(40,150,100,0.1); color: #289664; }
  [data-cat="A"] .card-cat { background: rgba(140,50,180,0.1); color: #8C32B4; }
  [data-cat="D"] .card-cat { background: rgba(184,134,11,0.1); color: var(--gold); }
  [data-cat="P"] .card-cat { background: rgba(200,64,26,0.1); color: var(--accent); }

  [data-cat="G"] .app-card::after { background: #276EB7; }
  [data-cat="U"] .app-card::after { background: #289664; }
  [data-cat="A"] .app-card::after { background: #8C32B4; }
  [data-cat="D"] .app-card::after { background: var(--gold); }
  [data-cat="P"] .app-card::after { background: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 768px) {
    header { grid-template-columns: 1fr; padding: 40px 20px 32px; }
    .header-stats { flex-direction: row; align-items: flex-start; gap: 32px; }
    .stat-block { text-align: left; }
    .filter-inner { padding: 10px 20px; }
    main { padding: 32px 20px 80px; }
    footer { padding: 24px 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
    .card-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

function formatDate(iso) {
  const [y,m,d] = iso.split("-");
  return new Date(y, m-1, d).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
}

function calcStreak() {
  const sorted = [...APPS].sort((a,b) => b.date.localeCompare(a.date));
  let streak = 0, prev = null;
  for (const app of sorted) {
    if (!prev) { streak = 1; prev = app.date; continue; }
    const diff = Math.round((new Date(prev) - new Date(app.date)) / 86400000);
    if (diff === 1) { streak++; prev = app.date; } else break;
  }
  return streak;
}

// ============================================================
//  CARD FACTORY
// ============================================================
function makeCard(app, index) {
  const a = document.createElement("a");
  a.className = "app-card";
  a.href = app.url;
  a.target = "_blank";
  a.rel = "noopener";
  a.setAttribute("data-cat", app.cat);
  a.style.animationDelay = `${index * 35}ms`;
  a.innerHTML = `
    <span class="card-arrow">↗</span>
    <div class="card-number">${app.num}</div>
    <div class="card-name">${app.name}</div>
    <div class="card-desc">${app.desc}</div>
    <div class="card-footer">
      <span class="card-cat">${CATS[app.cat].plural}</span>
      <span class="card-date">${formatDate(app.date)}</span>
    </div>
  `;
  return a;
}

// ============================================================
//  RENDER
// ============================================================
function buildCards(filter) {
  const main = document.getElementById("main-content");
  main.innerHTML = "";
  const visible = filter === "all" ? APPS : APPS.filter(a => a.cat === filter);

  if (filter === "all") {
    CAT_ORDER.forEach(cat => {
      const group = visible.filter(a => a.cat === cat);
      if (!group.length) return;
      const sec = document.createElement("div");
      sec.setAttribute("data-cat", cat);
      const hdr = document.createElement("div");
      hdr.className = "section-header";
      hdr.innerHTML = `
        <span class="section-title">${CATS[cat].label}</span>
        <span class="section-code">${cat}</span>
        <span class="section-count">${group.length} app${group.length !== 1 ? "s" : ""}</span>
      `;
      sec.appendChild(hdr);
      const grid = document.createElement("div");
      grid.className = "card-grid";
      group.forEach((app, i) => grid.appendChild(makeCard(app, i)));
      sec.appendChild(grid);
      main.appendChild(sec);
    });
  } else {
    const grid = document.createElement("div");
    grid.className = "card-grid";
    if (!visible.length) {
      const emp = document.createElement("div");
      emp.className = "empty-state";
      emp.textContent = "No apps in this category yet.";
      grid.appendChild(emp);
    } else {
      visible.forEach((app, i) => grid.appendChild(makeCard(app, i)));
    }
    main.appendChild(grid);
  }

  document.getElementById("total-count").textContent = APPS.length;
  document.getElementById("streak-count").textContent = calcStreak();
}

// ============================================================
//  FILTER BUTTONS
// ============================================================
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    buildCards(btn.dataset.filter);
  });
});

buildCards("all");
</script>
